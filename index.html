<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grahapravesham</title>
    <meta
      name="description"
      content="Grahapravesham invitation, schedule, livestream, and contact details."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Akaya+Kanadaka&family=Engagement&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <div class="top-strip">
        <div class="countdown-float" aria-live="polite">
          <span id="days">00</span>
          <small id="days-label">Days</small>
        </div>
        <div class="banner-wrap page-banner">
          <div class="banner-track">
            <p id="banner-text"></p>
            <p id="banner-text-clone" aria-hidden="true"></p>
          </div>
        </div>
        <div class="lang-switch" role="group" aria-label="Language selector">
          <button type="button" class="lang-btn" data-lang="en">English</button>
          <button type="button" class="lang-btn" data-lang="ta">தமிழ்</button>
        </div>
      </div>

      <main id="app" class="page-loading" aria-busy="true">
        <section class="hero section" id="home">
          <article class="panel hero-panel">
            <div class="hero-panel-grid">
              <div class="hero-panel-media">
                <div class="invite-frame">
                  <img id="invite-image" alt="Invitation" />
                </div>
              </div>
              <div class="hero-panel-copy">
                <div class="hero-copy-section hero-copy-header">
                  <p class="hero-header-line" id="hero-header-line">Shri Karuppaiya Thunai & Shri Venkatesa Perumal Thunai</p>
                </div>
                <div class="hero-copy-bottom">
                  <div class="hero-copy-section hero-copy-message">
                    <p class="hero-invite-line hero-invite-line-small" id="invite-line-1"></p>
                    <p class="hero-invite-line hero-invite-line-parents" id="family-parents-inline"></p>
                    <p class="hero-invite-line hero-invite-line-strong" id="invite-line-2"></p>
                    <p class="hero-invite-line hero-invite-line-small" id="invite-line-3"></p>
                    <p class="hero-invite-line hero-invite-line-strong" id="invite-line-4"></p>
                    <p class="hero-invite-line hero-invite-line-small" id="invite-line-5"></p>
                  </div>
                  <div class="hero-meta">
                    <div class="meta-card meta-card-when">
                      <div class="meta-card-section meta-card-title">
                        <span class="meta-label" id="when-label">When</span>
                      </div>
                      <div class="meta-card-section meta-card-content">
                        <strong id="event-datetime"></strong>
                      </div>
                      <div class="meta-card-section meta-card-action">
                        <button class="button secondary button-small chooser-trigger" id="calendar-summary" type="button">Add to Calendar</button>
                      </div>
                    </div>
                    <div class="meta-card meta-card-where">
                      <div class="meta-card-section meta-card-title">
                        <span class="meta-label" id="where-label">Where</span>
                      </div>
                      <div class="meta-card-section meta-card-content">
                        <strong id="event-location"></strong>
                      </div>
                      <div class="meta-card-section meta-card-action">
                        <button class="button secondary button-small chooser-trigger" id="directions-summary" type="button">Directions</button>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="hero-copy-section hero-copy-details">
                  <p class="parking-inline" id="parking-inline"></p>
                  <p class="parking-inline" id="meals-inline"></p>
                  <div class="hero-contact-row">
                    <strong class="hero-contact-phone" id="contact-phone"></strong>
                    <a class="button secondary button-icon" href="#" id="contact-call-link" aria-label="Call">
                      <img src="./assets/call.png" alt="" aria-hidden="true" />
                    </a>
                    <a class="button secondary button-icon" href="#" id="contact-whatsapp-link" target="_blank" rel="noreferrer" aria-label="WhatsApp">
                      <img src="./assets/whatsapp_logo.png" alt="" aria-hidden="true" />
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </article>
        </section>

        <section class="section" id="watch">
          <article class="panel panel-embed">
            <div class="section-heading">
              <p class="eyebrow" id="watch-eyebrow">Livestream</p>
            </div>
            <p id="stream-copy"></p>
            <div class="action-row">
              <a class="button primary button-small" id="stream-link" href="https://www.youtube.com/watch?v=b65uPGw4Wcs" target="_blank" rel="noreferrer" translate="no">Open Livestream</a>
            </div>
            <iframe
              id="stream-embed"
              title="Livestream"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
          </article>
        </section>
      </main>
    </div>

    <dialog class="chooser-dialog" id="chooser-dialog" aria-labelledby="chooser-dialog-title">
      <form method="dialog" class="chooser-dialog-card">
        <div class="chooser-dialog-head">
          <h3 id="chooser-dialog-title">Add to Calendar</h3>
          <button class="dialog-close" value="cancel" aria-label="Close">×</button>
        </div>
        <div class="chooser-panel">
          <a class="button primary button-small" id="chooser-primary-link" href="#" target="_blank" rel="noreferrer">Google Calendar</a>
          <a class="button secondary button-small" id="chooser-secondary-link" href="#" target="_blank" rel="noreferrer">Apple Calendar</a>
        </div>
      </form>
    </dialog>

    <script src="./script.js" type="module"></script>
  </body>
</html>
