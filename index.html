<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grahapravesham</title>
    <meta
      name="description"
      content="Grahapravesham invitation, schedule, livestream, and contact details."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <div class="top-strip">
        <div class="countdown-float" aria-live="polite">
          <span id="days">00</span>
          <small id="days-label">Days</small>
        </div>
        <div class="banner-wrap page-banner">
          <div class="banner-track">
            <p id="banner-text"></p>
            <p id="banner-text-clone" aria-hidden="true"></p>
          </div>
        </div>
        <div class="lang-switch" role="group" aria-label="Language selector">
          <button type="button" class="lang-btn" data-lang="en">English</button>
          <button type="button" class="lang-btn" data-lang="ta">தமிழ்</button>
        </div>
      </div>

      <main id="app" class="page-loading" aria-busy="true">
        <section class="hero section" id="home">
          <article class="panel hero-panel">
            <h1 id="event-title"></h1>
            <div class="hero-panel-grid">
              <div class="hero-panel-media">
                <div class="invite-frame">
                  <img id="invite-image" alt="Invitation" />
                </div>
              </div>
              <div class="hero-panel-copy">
                <p class="hero-subtitle" id="event-subtitle"></p>
                <div class="action-row hero-actions">
                  <a class="button primary" href="#schedule" id="hero-schedule-link">View Agenda</a>
                  <a class="button secondary" href="#watch" id="hero-watch-link">Watch Livestream</a>
                  <button class="button secondary chooser-trigger" id="contact-summary" type="button">Contact Host</button>
                </div>
                <div class="hero-meta">
                  <div class="meta-card">
                    <span class="meta-label" id="when-label">When</span>
                    <strong id="event-datetime"></strong>
                    <button class="button secondary button-small chooser-trigger" id="calendar-summary" type="button">Add to Calendar</button>
                  </div>
                  <div class="meta-card">
                    <span class="meta-label" id="where-label">Where</span>
                    <strong id="event-location"></strong>
                    <button class="button secondary button-small chooser-trigger" id="directions-summary" type="button">Directions</button>
                  </div>
                </div>
                <p class="parking-inline" id="parking-inline"></p>
              </div>
            </div>
          </article>
        </section>

        <section class="section" id="schedule">
          <div class="section-heading">
            <p class="eyebrow" id="schedule-eyebrow">Schedule</p>
            <h2 id="schedule-title">Plan your visit</h2>
          </div>
          <div class="timeline" id="schedule-list"></div>
        </section>

        <section class="section" id="watch">
          <div class="section-heading">
            <p class="eyebrow" id="watch-eyebrow">Livestream</p>
            <h2 id="watch-title">Watch from wherever you are</h2>
          </div>
          <article class="panel panel-embed">
            <p id="stream-copy"></p>
            <div class="action-row">
              <a class="button primary button-small" id="stream-link" href="#" target="_blank" rel="noreferrer" translate="no">Open Livestream</a>
            </div>
            <div class="stream-placeholder" id="stream-placeholder"></div>
            <iframe
              id="stream-embed"
              title="Livestream"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
          </article>
        </section>
      </main>
    </div>

    <dialog class="chooser-dialog" id="chooser-dialog" aria-labelledby="chooser-dialog-title">
      <form method="dialog" class="chooser-dialog-card">
        <div class="chooser-dialog-head">
          <h3 id="chooser-dialog-title">Add to Calendar</h3>
          <button class="dialog-close" value="cancel" aria-label="Close">×</button>
        </div>
        <div class="chooser-panel">
          <a class="button primary button-small" id="chooser-primary-link" href="#" target="_blank" rel="noreferrer">Google Calendar</a>
          <a class="button secondary button-small" id="chooser-secondary-link" href="#" target="_blank" rel="noreferrer">Apple Calendar</a>
        </div>
      </form>
    </dialog>

    <script src="./script.js" type="module"></script>
  </body>
</html>
